;===============================================================================
;  RS2V Custom Server – Main Server Configuration
;  Path: config/server.ini
;
;  Purpose:
;    Define core server settings: general info, network, gameplay, security,
;    logging, data paths, and module toggles.
;
;  Format:
;    Sections group related options.
;    Comments start with ';'
;===============================================================================

[General]
server_name               = RS2V Custom Server
version                   = 1.0.0
max_players               = 64
map_rotation_file         = config/maps.ini
game_modes_file           = config/game_modes.ini
motd_file                 = config/motd.txt
tick_rate                 = 60
timesync_interval_s       = 30
enable_announcements      = true
data_directory            = data/
log_directory             = logs/
admin_rcon_only           = false

[DataPaths]
maps_path                 = data/maps/    ; Directory for map assets, relative to server root

[Network]
port                      = 7777
bind_address              =
max_packet_size           = 1200
client_idle_timeout_s     = 300
heartbeat_interval_s      = 5
dual_stack                = true
idle_timeout_ms           = 300000
reliable_transport        = true

[Security]
enable_steam_auth         = true
fallback_custom_auth      = false
custom_auth_tokens_file   = config/auth_tokens.txt
enable_ban_manager        = true
ban_list_file             = config/ban_list.txt
enable_anti_cheat         = true
anti_cheat_mode           = emulate
eac_scanner_config_file   = config/eac_scanner.json

[Scripting]
enable_csharp_scripting    = false          	; Enable/disable C# scripting support (true/false)
scripts_path               = data/scripts/ 	; Directory where .cs scripts are loaded from
script_reload_interval_ms  = 500           	; Debounce interval for file-watcher reloads (milliseconds)
default_namespace          = DynamicScripts	; Optional default namespace for wrapped scripts

[Logging]
log_level                 = info
log_to_console            = true
log_to_file               = true
log_file                  = server.log
log_max_size_mb           = 10
log_max_files             = 5
log_timestamp_format      = %Y-%m-%d %H:%M:%S

[Performance]
max_cpu_cores             = 0
cpu_affinity_mask         = 0
game_tick_rate            = 60
dynamic_tuning_enabled    = true

[ThreadPool]
worker_thread_count       = 0
max_task_queue_length     = 256
spill_threshold           = 512

[MemoryPool]
preallocate_chunks        = 4
max_chunks                = 0

[Profiler]
enable_profiling          = true
min_record_ms             = 0
buffer_size               = 1000
flush_interval_s          = 10
output_format             = json
profiler_output_path      = logs/profiler.json

[Telemetry]
batch_size                = 50
flush_interval_s          = 5

[Admin]
enable_rcon               = true
rcon_port                 = 27020
rcon_password             = ChangeMe123
rcon_min_level            = 2
admin_list_file           = config/admin_list.txt
chat_auth_enabled         = true

;-------------------------------------------------------------------------------
; [ReverseEngineering] — self reverse-engineering / protocol decoder.
; Analyses live traffic to decode the UE3/RS2V wire protocol. Structural
; analysis and bit-packed bunch property decoding (against data/re/netfields)
; run with low cost. log_raw_packets and export_json are OFF by default: they
; retain attacker-controlled payloads / write files, so enable them only for an
; active RE session, not on a public server.
;-------------------------------------------------------------------------------
[ReverseEngineering]
enabled                   = true
log_raw_packets           = false   ; retain raw payloads in memory (RE sessions only)
export_json               = false   ; periodically write JSON/captures to output_dir
detect_ue3_bunches        = true
decode_bunch_properties   = true    ; decode bit-packed properties vs handle tables
async_analysis            = true    ; run analysis off the network hot path
persist_state             = true    ; merge cumulative per-tag stats across runs
output_dir                = protocol_analysis
netfields_dir             = data/re/netfields
max_channels              = 1024    ; object-ref/None bound (RS2-7258 verified)
export_interval           = 300

;===============================================================================
; End of config/server.ini
;===============================================================================