apiVersion: v1
kind: ConfigMap
metadata:
  name: rs2v-config
  namespace: rs2v
  labels:
    app: rs2v-server
data:
  server.ini: |
    [Server]
    Name=RS2V Kubernetes Server
    Port=7777
    MaxPlayers=64
    TickRate=60

    [Network]
    bandwidth_limit=131072
    timeout_seconds=30

    [Telemetry]
    enabled=true
    file_reporter=true
    prometheus_reporter=true
    prometheus_port=9090
    metrics_directory=/opt/rs2v/telemetry/output
    sampling_interval_ms=1000

    [ReverseEngineering]
    enabled=true
    log_raw_packets=false
    export_json=true
    detect_ue3_bunches=true
    output_dir=/opt/rs2v/protocol_analysis
    export_interval=300
